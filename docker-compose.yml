# Default stack for Dokploy / headless servers (no host PulseAudio).
# Local audio: docker compose -f docker-compose.yml -f docker-compose.audio.yml up -d --build

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.audio
    image: hermes-agent-audio:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"   # gateway API
      - "9119:9119"   # dashboard (only reached when HERMES_DASHBOARD=1)
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_DASHBOARD=1
      # Required when the dashboard is exposed through Dokploy/Traefik.
      # Add a reverse-proxy auth layer before using this on the public internet.
      - HERMES_DASHBOARD_INSECURE=1
      # Set in Dokploy env or .env:
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  hermes-data:
